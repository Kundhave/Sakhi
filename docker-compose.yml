services:
  # ── PostgreSQL Database ─────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: sakhi_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: sakhi
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sakhi"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Node.js Backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sakhi_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:postgres123@postgres:5432/sakhi
      PORT: 3001
      API_KEY: sakhi_secret_key_change_this
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy

  # ── React Frontend (nginx) ──────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Passed as build-time env var so Vite bakes the URL into the bundle.
        # In Docker, the browser hits nginx which proxies /api → backend,
        # so we use a relative path (empty string = same host).
        VITE_API_URL: ""
    container_name: sakhi_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
